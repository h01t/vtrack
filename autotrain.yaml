agent:
  provider: deepseek
  model: deepseek-reasoner

metric:
  name: mAP
  target: 0.88
  direction: maximize

budget:
  time_seconds: 14400         # 4 hours
  max_iterations: 50
  api_dollars: 2.00
  experiment_timeout_seconds: 1800  # 30 min — enough for 10-15 epoch runs

execution:
  train_command: ".venv/bin/python train.py"
  mode: ssh
  ssh_host: blackbox
  ssh_remote_dir: /home/holt/Dev/object-det
  ssh_setup_command: "~/.local/bin/uv sync"
  gpu_device: "0"
  rsync_excludes:
    - ".venv"
    - "data"
    - "__pycache__"
    - ".git"
    - ".autotrain"
    - "*.pt"
    - "*.pth"
    - "*.ckpt"
    - "*.onnx"
    - "outputs"
    - "runs"
    - "datasets"
    - "artifacts"

sandbox:
  writable_files:
    - train.py

notify:
  terminal: true
